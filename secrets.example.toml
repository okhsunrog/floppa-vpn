# Floppa VPN Secrets Example
# Copy to /etc/floppa-vpn/secrets.toml (permissions: 0600)
# IMPORTANT: This file contains sensitive data, keep it secure!

# PostgreSQL connection URL
database_url = "postgres://floppa:password@localhost/floppa_vpn"

# WireGuard server private key (base64)
# Generate with: wg genkey
# Public key is derived automatically from this
wg_private_key = "GENERATE_WITH_wg_genkey"

[bot]
# Telegram bot token from @BotFather
token = "YOUR_TELEGRAM_BOT_TOKEN"

[auth]
# Secret key for signing JWT tokens
# Generate with: openssl rand -hex 32
jwt_secret = "GENERATE_WITH_openssl_rand_-hex_32"

# Key for encrypting WireGuard private keys at rest (32-byte hex)
# Generate with: openssl rand -hex 32
encryption_key = "GENERATE_WITH_openssl_rand_-hex_32"

# Telegram user IDs that are automatically admins
# Get your ID from @userinfobot on Telegram
admin_telegram_ids = [123456789]
