name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: extractions/setup-just@v4

      - name: Check justfile formatting
        run: just --unstable --fmt --check

      - name: Check Rust formatting
        run: |
          cargo fmt --check
          cargo fmt --check --manifest-path floppa-client/src-tauri/Cargo.toml
          cargo fmt --check --manifest-path tauri-plugin-vpn/Cargo.toml

  clippy:
    name: Clippy
    needs: frontend
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Download frontend (needed for memory-serve embedding)
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: floppa-face/dist

      - name: Clippy (workspace)
        run: cargo clippy -- -D warnings

  test:
    name: Test & sqlx
    needs: frontend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: floppa
          POSTGRES_PASSWORD: floppa
          POSTGRES_DB: floppa_vpn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://floppa:floppa@localhost/floppa_vpn
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install frontend dependencies
        run: vp install --frozen-lockfile

      - name: Download frontend (needed for memory-serve embedding)
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: floppa-face/dist

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.9.0 --no-default-features --features postgres,rustls

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check sqlx cache is up to date
        run: cargo sqlx prepare --workspace --check

      - name: Run tests
        run: cargo test

      - name: Check OpenAPI client is up to date
        run: |
          cargo run -p floppa-server -- --openapi > floppa-web-shared/openapi.json
          (cd floppa-web-shared && vp exec openapi-ts)
          git diff --exit-code -- floppa-web-shared/openapi.json floppa-web-shared/src/client/ \
            || (echo "::error::OpenAPI client is stale. Run 'just openapi' and commit the changes." && exit 1)

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-

      - name: Audit dependencies
        run: vp pm audit

      - name: Vite+ check
        run: vp check

      - name: Vue type-check
        run: vp run --filter floppa-web-shared --filter floppa-face --filter floppa-client typecheck

      - name: Frontend tests
        run: vp run --filter floppa-web-shared test

      - name: Build frontends
        run: |
          vp run --filter floppa-face build
          vp run --filter floppa-client build

      - name: Upload server frontend
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: floppa-face/dist

      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}

  client:
    name: Client checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "floppa-client/src-tauri -> target"

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Clippy (client)
        run: cargo clippy --manifest-path floppa-client/src-tauri/Cargo.toml -- -D warnings

      - name: Clippy (vpn plugin)
        run: cargo clippy --manifest-path tauri-plugin-vpn/Cargo.toml -- -D warnings

  kotlin:
    name: Kotlin format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: extractions/setup-just@v4

      - name: Check Kotlin formatting
        run: just check-kotlin

  cli:
    name: floppa-cli (CLI connector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "floppa-cli -> floppa-cli/target"

      - name: Format check
        run: cargo fmt --check --manifest-path floppa-cli/Cargo.toml

      - name: Clippy
        # The CLI shells out to system tools at runtime but needs no network
        # plumbing to build/test, so this runs without root or extra services.
        run: cargo clippy --manifest-path floppa-cli/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path floppa-cli/Cargo.toml
