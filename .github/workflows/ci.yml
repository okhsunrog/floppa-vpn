name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: floppa
          POSTGRES_PASSWORD: floppa
          POSTGRES_DB: floppa_vpn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://floppa:floppa@localhost/floppa_vpn
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend (needed for memory-serve embedding)
        run: cd floppa-face && bun run build

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check sqlx cache is up to date
        run: cargo sqlx prepare --workspace --check

      - name: Check justfile formatting
        uses: extractions/setup-just@v3

      - run: just --unstable --fmt --check

      - name: Check Rust formatting
        run: |
          cargo fmt --check
          cargo fmt --check --manifest-path floppa-client/src-tauri/Cargo.toml
          cargo fmt --check --manifest-path tauri-plugin-vpn/Cargo.toml
          cargo fmt --check --manifest-path crates/floppa-cli/Cargo.toml
          cargo fmt --check --manifest-path crates/floppa-test-tunnel/Cargo.toml

      - name: Clippy (workspace)
        run: cargo clippy -- -D warnings

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Clippy (excluded crates)
        run: |
          cargo clippy --manifest-path floppa-client/src-tauri/Cargo.toml -- -D warnings
          cargo clippy --manifest-path tauri-plugin-vpn/Cargo.toml -- -D warnings
          cargo clippy --manifest-path crates/floppa-cli/Cargo.toml -- -D warnings
          cargo clippy --manifest-path crates/floppa-test-tunnel/Cargo.toml -- -D warnings

      - name: Tests
        run: cargo test

      - name: Check OpenAPI client is up to date
        run: |
          cargo run -p floppa-server -- --openapi > floppa-web-shared/openapi.json
          cd floppa-web-shared && bun run openapi-ts
          git diff --exit-code -- floppa-web-shared/openapi.json floppa-web-shared/src/client/ \
            || (echo "::error::OpenAPI client is stale. Run 'just openapi' and commit the changes." && exit 1)

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format check (shared)
        run: cd floppa-web-shared && bun run format:check

      - name: Format check (admin)
        run: cd floppa-face && bun run format:check

      - name: Format check (client)
        run: cd floppa-client && bun run format:check

      - name: Type-check & lint (shared)
        run: cd floppa-web-shared && bun run type-check && bun run lint:check

      - name: Type-check & lint (admin)
        run: cd floppa-face && bun run type-check && bun run lint:check

      - name: Type-check & lint (client)
        run: cd floppa-client && bun run type-check && bun run lint:check

      - name: Build client frontend
        run: cd floppa-client && bun run build

  kotlin:
    name: Kotlin format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download ktfmt
        run: |
          mkdir -p .cache
          curl -sSL -o .cache/ktfmt-0.61-with-dependencies.jar \
            https://repo1.maven.org/maven2/com/facebook/ktfmt/0.61/ktfmt-0.61-with-dependencies.jar

      - name: Check Kotlin formatting
        run: java -jar .cache/ktfmt-0.61-with-dependencies.jar --kotlinlang-style --set-exit-if-changed --dry-run tauri-plugin-vpn/android/src
