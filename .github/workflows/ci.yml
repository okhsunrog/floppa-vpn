name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: extractions/setup-just@v3

      - name: Check justfile formatting
        run: just --unstable --fmt --check

      - name: Check Rust formatting
        run: |
          cargo fmt --check
          cargo fmt --check --manifest-path floppa-client/src-tauri/Cargo.toml
          cargo fmt --check --manifest-path tauri-plugin-vpn/Cargo.toml

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend (needed for memory-serve embedding)
        run: cd floppa-face && bun install && bun run build

      - name: Clippy (workspace)
        run: cargo clippy -- -D warnings

  test:
    name: Test & sqlx
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: floppa
          POSTGRES_PASSWORD: floppa
          POSTGRES_DB: floppa_vpn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://floppa:floppa@localhost/floppa_vpn
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend (needed for memory-serve embedding)
        run: cd floppa-face && bun install && bun run build

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check sqlx cache is up to date
        run: cargo sqlx prepare --workspace --check

      - name: Run tests
        run: cargo test

      - name: Check OpenAPI client is up to date
        run: |
          cargo run -p floppa-server -- --openapi > floppa-web-shared/openapi.json
          cd floppa-web-shared && bun run openapi-ts
          git diff --exit-code -- floppa-web-shared/openapi.json floppa-web-shared/src/client/ \
            || (echo "::error::OpenAPI client is stale. Run 'just openapi' and commit the changes." && exit 1)

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: |
          cd floppa-web-shared && bun run format:check
          cd ../floppa-face && bun run format:check
          cd ../floppa-client && bun run format:check

      - name: Type-check & lint
        run: |
          cd floppa-web-shared && bun run type-check && bun run lint:check
          cd ../floppa-face && bun run type-check && bun run lint:check
          cd ../floppa-client && bun run type-check && bun run lint:check

      - name: Build client frontend
        run: cd floppa-client && bun run build

  client:
    name: Client checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "floppa-client/src-tauri -> target"

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Clippy (client)
        run: cargo clippy --manifest-path floppa-client/src-tauri/Cargo.toml -- -D warnings

      - name: Clippy (vpn plugin)
        run: cargo clippy --manifest-path tauri-plugin-vpn/Cargo.toml -- -D warnings

  kotlin:
    name: Kotlin format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: extractions/setup-just@v3

      - name: Check Kotlin formatting
        run: just check-kotlin
